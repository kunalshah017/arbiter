# Strategy templates keyed by market regime.
# Each strategy defines indicators + entry/exit conditions for the Rust engine.

trending_up:
  name: "Momentum Breakout"
  indicators:
    - { type: "EMA", period: 9 }
    - { type: "EMA", period: 21 }
    - { type: "RSI", period: 14 }
    - { type: "ATR", period: 14 }
  entry_conditions:
    - { left: "EMA_9", op: ">", right: "EMA_21" }
    - { left: "RSI_14", op: ">", right: "55" }
  exit_conditions:
    - { left: "EMA_9", op: "crossunder", right: "EMA_21" }
    - { left: "RSI_14", op: "<", right: "40" }
  stop_loss_atr_multiple: 2.0
  take_profit_atr_multiple: 4.0

mean_reverting:
  name: "Mean Reversion"
  indicators:
    - { type: "BBands", period: 20, std_dev: 2.0 }
    - { type: "RSI", period: 14 }
    - { type: "ATR", period: 14 }
    - { type: "EMA", period: 50 }
  entry_conditions:
    - { left: "close", op: "<", right: "BBANDS_20.lower" }
    - { left: "RSI_14", op: "<", right: "30" }
  exit_conditions:
    - { left: "close", op: ">", right: "BBANDS_20.middle" }
    - { left: "RSI_14", op: ">", right: "65" }
  stop_loss_atr_multiple: 1.5
  take_profit_atr_multiple: 3.0

high_volatility:
  name: "Volatility Breakout"
  indicators:
    - { type: "ATR", period: 14 }
    - { type: "ATR", period: 50, alias: "ATR_50" }
    - { type: "EMA", period: 21 }
    - { type: "RSI", period: 14 }
  entry_conditions:
    - { left: "ATR_14", op: ">", right: "ATR_50" }
    - { left: "RSI_14", op: ">", right: "50" }
  exit_conditions:
    - { left: "close", op: "<", right: "EMA_21" }
  stop_loss_atr_multiple: 3.0
  take_profit_atr_multiple: 5.0

trending_down:
  name: "Cautious Momentum"
  indicators:
    - { type: "EMA", period: 12 }
    - { type: "EMA", period: 26 }
    - { type: "RSI", period: 14 }
    - { type: "ATR", period: 14 }
  entry_conditions:
    - { left: "EMA_12", op: ">", right: "EMA_26" }
    - { left: "RSI_14", op: ">", right: "45" }
    - { left: "RSI_14", op: "<", right: "75" }
  exit_conditions:
    - { left: "EMA_12", op: "<", right: "EMA_26" }
  stop_loss_atr_multiple: 1.5
  take_profit_atr_multiple: 3.5

choppy:
  name: "Tight Range Scalper"
  indicators:
    - { type: "EMA", period: 8 }
    - { type: "EMA", period: 21 }
    - { type: "RSI", period: 9 }
    - { type: "ATR", period: 14 }
  entry_conditions:
    - { left: "EMA_8", op: ">", right: "EMA_21" }
    - { left: "RSI_9", op: ">", right: "50" }
  exit_conditions:
    - { left: "RSI_9", op: "<", right: "40" }
    - { left: "EMA_8", op: "<", right: "EMA_21" }
  stop_loss_atr_multiple: 1.0
  take_profit_atr_multiple: 2.0
